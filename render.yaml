# =========================================================
# Render.com Infrastructure as Code (Blueprint)
# Documentation: https://render.com/docs/blueprint-spec
# =========================================================

services:
  - type: web
    name: hirematch-resume-ai
    env: python
    region: ohio
    plan: free
    branch: main
    
    # -----------------------------------------------------
    # Build & Run Commands
    # -----------------------------------------------------
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn wsgi:app"
    
    # -----------------------------------------------------
    # Environment Variables
    # -----------------------------------------------------
    envVars:
      # --- System Config ---
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: FLASK_ENV
        value: "production"
      - key: PORT
        value: "10000"
        
      # --- Security ---
      - key: SECRET_KEY
        generateValue: true
        
      # --- Firebase Credentials (fill in Render Dashboard) ---
      - key: FIREBASE_API_KEY
        sync: false
      - key: FIREBASE_JSON
        sync: false
