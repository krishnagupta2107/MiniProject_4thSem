{% extends "base.html" %}
{% block title %}Reset Password – HireMatch{% endblock %}

{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card border-0 shadow-sm">
        <div class="card-body p-4">
          <h4 class="fw-bold mb-3 text-center">Reset Password</h4>
          <p class="text-muted text-center mb-4">Enter your email and we'll send a link to reset your password.</p>
          <form method="POST" action="">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
            <div class="mb-3">
              <label class="form-label fw-medium">Email Address</label>
              <input type="email" name="email" class="form-control" required/>
            </div>
            <button class="btn btn-primary w-100" type="submit">Request Reset</button>
          </form>
          <div class="text-center mt-3">
            <a href="{{ url_for('auth.login') }}" class="text-decoration-none">Back to Login</a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
