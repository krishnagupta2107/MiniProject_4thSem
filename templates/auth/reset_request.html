{% extends "base.html" %}
<!-- password bhool gya bhai!  -->
{% block title %}Reset Password – HireMatch{% endblock %}

{% block content %}
<div class="auth-wrapper d-flex align-items-center justify-content-center" style="min-height: calc(100vh - 180px); padding: 2rem 0;">
  <div class="card auth-card border-0 shadow-lg bg-white rounded-4 overflow-hidden" style="width: 100%; max-width: 440px;">
    <div class="bg-warning" style="height: 5px; width: 100%;"></div>
    
    <div class="card-body p-4 p-md-5">
      <div class="text-center mb-4">
        <div class="d-inline-flex justify-content-center align-items-center bg-warning bg-opacity-10 text-warning rounded-circle mb-3" style="width: 60px; height: 60px;">
           <i class="fas fa-envelope-open-text fs-3"></i>
        </div>
        <h3 class="fw-bolder mb-2 text-dark" style="letter-spacing: -0.02em;">Reset Password</h3>
        <p class="text-muted fw-medium fs-6 mb-0 px-2">Enter your email and we'll send a link to reset your password magic link style.</p>
      </div>

      <form method="POST" action="">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>

        <div class="mb-4">
          <label class="form-label fw-bold text-dark mb-1">Email Address</label>
          <div class="position-relative">
             <i class="fas fa-envelope position-absolute top-50 translate-middle-y text-muted opacity-50 ms-3"></i>
             <input type="email" name="email" class="form-control bg-light border-0 ps-5 py-2 rounded-3 text-dark fw-medium" placeholder="mail@example.com" required/>
          </div>
        </div>

        <button type="submit" class="btn btn-primary w-100 py-3 rounded-pill shadow-sm hover-lift fw-bold fs-6 mb-4 text-uppercase" style="letter-spacing: 0.05em;">
          Request Magic Link
        </button>
      </form>

      <div class="text-center">
        <a href="{{ url_for('auth.login') }}" class="text-decoration-none fw-medium text-muted">
          <i class="fas fa-arrow-left me-1"></i> Back to Login
        </a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
