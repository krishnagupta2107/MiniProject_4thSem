{% extends "base.html" %}
{% block title %}Register – HireMatch{% endblock %}

{% block content %}
<div class="auth-wrapper">
  <div class="card auth-card glass-panel shadow-lg">
    <div class="text-center mb-4">
      <h3 class="fw-bold mb-2">Create an Account</h3>
      <p class="text-muted">Start matching resumes to jobs in seconds</p>
    </div>

    <button type="button" class="btn btn-light border w-100 py-2 mb-3 fw-semibold d-flex align-items-center justify-content-center hover-lift" id="googleAuthBtn">
        <i class="fab fa-google text-danger me-2"></i> Sign up with Google
    </button>
    
    <div class="d-flex align-items-center mb-4">
       <hr class="flex-grow-1 opacity-25">
       <span class="px-3 text-muted small fw-medium">OR EMAIL</span>
       <hr class="flex-grow-1 opacity-25">
    </div>

    <form method="POST" action="{{ url_for('auth.register') }}" novalidate>
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>

      <div class="mb-3">
        <label class="form-label fw-bold small text-muted text-uppercase">Full Name</label>
        <div class="input-group">
          <span class="input-group-text bg-transparent border-end-0 text-muted"><i class="fas fa-user"></i></span>
          <input type="text" name="full_name" class="form-control border-start-0 ps-0" placeholder="Krishna Gupta"
                 value="{{ request.form.get('full_name', '') }}" required/>
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label fw-bold small text-muted text-uppercase">Email Address</label>
        <div class="input-group">
          <span class="input-group-text bg-transparent border-end-0 text-muted"><i class="fas fa-envelope"></i></span>
          <input type="email" name="email" class="form-control border-start-0 ps-0" placeholder="you@example.com"
                 value="{{ request.form.get('email', '') }}" required/>
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label fw-bold small text-muted text-uppercase">Password</label>
        <div class="input-group">
          <span class="input-group-text bg-transparent border-end-0 text-muted"><i class="fas fa-lock"></i></span>
          <input type="password" name="password" class="form-control border-start-0 ps-0" placeholder="Minimum 6 characters" required/>
        </div>
      </div>

      <div class="mb-4">
        <label class="form-label fw-bold small text-muted text-uppercase">Confirm Password</label>
        <div class="input-group">
          <span class="input-group-text bg-transparent border-end-0 text-muted"><i class="fas fa-check-double"></i></span>
          <input type="password" name="confirm_password" class="form-control border-start-0 ps-0" placeholder="••••••••" required/>
        </div>
      </div>

      <button type="submit" class="btn btn-primary w-100 py-3 rounded-pill shadow">
        Create Account <i class="fas fa-user-plus ms-2"></i>
      </button>
    </form>

    <div class="mt-4 text-center">
      <p class="text-muted small mb-0">
        Already have an account?
        <a href="{{ url_for('auth.login') }}" class="fw-bold text-primary text-decoration-none">Log in</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script type="module">
  import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
  
  const googleBtn = document.getElementById("googleAuthBtn");
  if (googleBtn) {
      googleBtn.addEventListener("click", async () => {
          const auth = getAuth(window.firebaseApp);
          const provider = new GoogleAuthProvider();
          
          try {
              const result = await signInWithPopup(auth, provider);
              const idToken = await result.user.getIdToken();
              
              const res = await fetch("{{ url_for('auth.google_auth') }}", {
                  method: "POST",
                  headers: { 
                      "Content-Type": "application/json",
                      "X-CSRFToken": "{{ csrf_token() }}"
                  },
                  body: JSON.stringify({ token: idToken })
              });
              
              const data = await res.json();
              if (data.success) {
                  window.location.href = data.redirect;
              } else {
                  alert("Google Sign-In backend verification failed: " + data.error);
              }
          } catch (error) {
              console.error(error);
              if (error.code !== "auth/popup-closed-by-user") {
                  alert("Error during Google sign-up: " + error.message);
              }
          }
      });
  }
</script>
{% endblock %}
