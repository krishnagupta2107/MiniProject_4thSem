{% extends "base.html" %}
<!-- Registration Entry Point -->
{% block title %}Register – HireMatch{% endblock %}

{% block content %}
<div class="auth-wrapper d-flex align-items-center justify-content-center" style="min-height: calc(100vh - 180px); padding: 2rem 0;">
  
  <div class="card auth-card border-0 shadow-lg bg-white rounded-4 overflow-hidden" style="width: 100%; max-width: 440px;">
    <div class="bg-success" style="height: 5px; width: 100%;"></div>
    
    <div class="card-body p-4 p-md-5">
      <div class="text-center mb-4">
        <div class="d-inline-flex justify-content-center align-items-center bg-success bg-opacity-10 text-success rounded-circle mb-3" style="width: 60px; height: 60px;">
           <i class="fas fa-rocket fs-3"></i>
        </div>
        <h3 class="fw-bolder mb-2 text-dark" style="letter-spacing: -0.02em;">Create Account</h3>
        <p class="text-muted fw-medium fs-6 mb-0">It only takes a minute</p>
      </div>

      <!-- Google OAuth Sign-Up Button -->
      <button type="button" class="btn btn-white border w-100 py-2 mb-4 fw-bold text-dark d-flex align-items-center justify-content-center hover-lift shadow-sm rounded-pill bg-white" id="googleAuthBtn">
          <i class="fab fa-google text-danger me-2 fs-5"></i> Register with Google
      </button>
      
      <div class="d-flex align-items-center mb-4">
         <hr class="flex-grow-1 border-secondary m-0">
         <span class="px-3 text-muted small fw-bold text-uppercase" style="letter-spacing: 0.1em; font-size: 0.75rem;">OR EMAIL</span>
         <hr class="flex-grow-1 border-secondary m-0">
      </div>

      <!-- Standard Email/Password Registration Form -->
      <form method="POST" action="{{ url_for('auth.register') }}" novalidate>
        <!-- CSRF Token for Security -->
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>

        <div class="mb-3">
          <label class="form-label fw-bold text-dark mb-1">Full Name</label>
          <div class="position-relative">
             <i class="fas fa-user position-absolute top-50 translate-middle-y text-muted opacity-50 ms-3"></i>
             <input type="text" name="full_name" class="form-control bg-light border-0 ps-5 py-2 rounded-3 text-dark fw-medium" placeholder="Arjun Sharma"
                    value="{{ request.form.get('full_name', '') }}" required/>
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label fw-bold text-dark mb-1">Email Address</label>
          <div class="position-relative">
             <i class="fas fa-envelope position-absolute top-50 translate-middle-y text-muted opacity-50 ms-3"></i>
             <input type="email" name="email" class="form-control bg-light border-0 ps-5 py-2 rounded-3 text-dark fw-medium" placeholder="mail@example.com"
                    value="{{ request.form.get('email', '') }}" required/>
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label fw-bold text-dark mb-1">Passsword</label>
          <div class="position-relative">
             <i class="fas fa-lock position-absolute top-50 translate-middle-y text-muted opacity-50 ms-3"></i>
             <input type="password" name="password" class="form-control bg-light border-0 ps-5 py-2 rounded-3 text-dark fw-medium" placeholder="Min 6 characters" required/>
          </div>
        </div>

        <div class="mb-5">
          <label class="form-label fw-bold text-dark mb-1">Confirm Password</label>
          <div class="position-relative">
             <i class="fas fa-check-double position-absolute top-50 translate-middle-y text-muted opacity-50 ms-3"></i>
             <input type="password" name="confirm_password" class="form-control bg-light border-0 ps-5 py-2 rounded-3 text-dark fw-medium" placeholder="Re-type password" required/>
          </div>
        </div>

        <!-- Primary Sign-Up Button -->
        <button type="submit" class="btn btn-primary w-100 py-3 rounded-pill shadow-sm hover-lift fw-bold fs-6 mb-4">
          Complete Sign Up <i class="fas fa-user-plus ms-2 fs-7"></i>
        </button>
      </form>

      <div class="text-center">
        <p class="text-muted fw-medium mb-0">
          Already on HireMatch?
          <a href="{{ url_for('auth.login') }}" class="fw-bold text-primary text-decoration-none border-bottom border-primary ms-1">Log in here</a>
        </p>
      </div>
      
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script type="module">
  // Firebase Auth module imports
  import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
  
  const googleBtn = document.getElementById("googleAuthBtn");
  if (googleBtn) {
      googleBtn.addEventListener("click", async () => {
          const auth = getAuth(window.firebaseApp);
          const provider = new GoogleAuthProvider();
          
          try {
              const result = await signInWithPopup(auth, provider);
              const idToken = await result.user.getIdToken();
              
              const res = await fetch("{{ url_for('auth.google_auth') }}", {
                  method: "POST",
                  headers: { 
                      "Content-Type": "application/json",
                      "X-CSRFToken": "{{ csrf_token() }}"
                  },
                  body: JSON.stringify({ token: idToken })
              });
              
              const data = await res.json();
              if (data.success) {
                  window.location.href = data.redirect;
              } else {
                  alert("Google Authentication failed: " + data.error);
              }
          } catch (error) {
              console.error(error);
              if (error.code !== "auth/popup-closed-by-user") {
                  alert("Authentication popup error: " + error.message);
              }
          }
      });
  }
</script>
{% endblock %}
